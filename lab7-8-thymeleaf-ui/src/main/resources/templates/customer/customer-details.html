<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<body>
    <section layout:fragment="content">
        <h2>Customer Details</h2>
        <a th:href="@{/customers/details/new}" class="btn btn-success mb-3">Add New Customer</a>
        <a th:href="@{/customers}" class="btn btn-secondary mb-3">Back to Dashboard</a>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer Number</th>
                    <th>Type</th>
                    <th>Full Name</th>
                    <th>DOB</th>
                    <th>Status</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.id}"></td>
                    <td th:text="${customer.customerNumber}"></td>
                    <td th:text="${customer.customerType}"></td>
                    <td th:text="${customer.fullName}"></td>
                    <td th:text="${customer.dateOfBirth}"></td>
                    <td th:text="${customer.status}"></td>
                    <td th:text="${customer.emailId}"></td>
                    <td th:text="${customer.mobileNumber}"></td>
                    <td>
                        <a th:href="@{/customers/details/edit/{id}(id=${customer.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <form th:action="@{/customers/details/delete/{id}(id=${customer.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav>
            <ul class="pagination">
                <li class="page-item" th:if="${currentPage > 1}">
                    <a class="page-link" th:href="@{'/customers/details?page=' + ${currentPage - 1}}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{'/customers/details?page=' + ${i}}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:if="${currentPage < totalPages}">
                    <a class="page-link" th:href="@{'/customers/details?page=' + ${currentPage + 1}}">Next</a>
                </li>
            </ul>
        </nav>
    </section>
</body>
</html>
