<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<body>
    <section layout:fragment="content">
        <h2>Customer Proof of Identity</h2>
        <a th:href="@{/customers/proofs/new}" class="btn btn-success mb-3">Add New Proof</a>
        <a th:href="@{/customers}" class="btn btn-secondary mb-3">Back to Dashboard</a>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer Number</th>
                    <th>ID Type</th>
                    <th>ID Number</th>
                    <th>Issue Date</th>
                    <th>Expiry Date</th>
                    <th>Issuing Authority</th>
                    <th>Country</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="proof : ${proofs}">
                    <td th:text="${proof.id}"></td>
                    <td th:text="${proof.customerNumber}"></td>
                    <td th:text="${proof.idType}"></td>
                    <td th:text="${proof.idNumber}"></td>
                    <td th:text="${proof.issueDate}"></td>
                    <td th:text="${proof.expiryDate}"></td>
                    <td th:text="${proof.issuingAuthority}"></td>
                    <td th:text="${proof.issuingCountry}"></td>
                    <td>
                        <a th:href="@{/customers/proofs/edit/{id}(id=${proof.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <form th:action="@{/customers/proofs/delete/{id}(id=${proof.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav>
            <ul class="pagination">
                <li class="page-item" th:if="${currentPage > 1}">
                    <a class="page-link" th:href="@{'/customers/proofs?page=' + ${currentPage - 1}}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{'/customers/proofs?page=' + ${i}}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:if="${currentPage < totalPages}">
                    <a class="page-link" th:href="@{'/customers/proofs?page=' + ${currentPage + 1}}">Next</a>
                </li>
            </ul>
        </nav>
    </section>
</body>
</html>
