<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<body>
    <section layout:fragment="content">
        <h2>Customer Addresses</h2>
        <a th:href="@{/customers/addresses/new}" class="btn btn-success mb-3">Add New Address</a>
        <a th:href="@{/customers}" class="btn btn-secondary mb-3">Back to Dashboard</a>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer Number</th>
                    <th>Address Type</th>
                    <th>Address Line 1</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Postal Code</th>
                    <th>Country</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="address : ${addresses}">
                    <td th:text="${address.id}"></td>
                    <td th:text="${address.customerNumber}"></td>
                    <td th:text="${address.addressType}"></td>
                    <td th:text="${address.addressLine1}"></td>
                    <td th:text="${address.city}"></td>
                    <td th:text="${address.state}"></td>
                    <td th:text="${address.postalCode}"></td>
                    <td th:text="${address.country}"></td>
                    <td>
                        <a th:href="@{/customers/addresses/edit/{id}(id=${address.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <form th:action="@{/customers/addresses/delete/{id}(id=${address.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav>
            <ul class="pagination">
                <li class="page-item" th:if="${currentPage > 1}">
                    <a class="page-link" th:href="@{'/customers/addresses?page=' + ${currentPage - 1}}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{'/customers/addresses?page=' + ${i}}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:if="${currentPage < totalPages}">
                    <a class="page-link" th:href="@{'/customers/addresses?page=' + ${currentPage + 1}}">Next</a>
                </li>
            </ul>
        </nav>
    </section>
</body>
</html>
