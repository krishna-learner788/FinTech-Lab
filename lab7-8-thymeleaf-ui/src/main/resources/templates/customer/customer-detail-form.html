<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{layout.html}">
<body>
    <section layout:fragment="content">
        <h2 th:text="${customerDetail.id != null} ? 'Edit Customer Detail' : 'Add Customer Detail'">Customer Detail Form</h2>

        <form th:action="${customerDetail.id != null} ? @{/customers/details/update/{id}(id=${customerDetail.id})} : @{/customers/details/save}"
              th:object="${customerDetail}" method="post">

            <div class="form-group" th:if="${customerDetail.id != null}">
                <label for="id">ID</label>
                <input type="text" class="form-control" id="id" th:field="*{id}" disabled>
            </div>

            <div class="form-group">
                <label for="customerNumber">Customer Number</label>
                <input type="text" class="form-control" id="customerNumber" th:field="*{customerNumber}" maxlength="50">
                <div class="text-danger" th:if="${#fields.hasErrors('customerNumber')}" th:errors="*{customerNumber}"></div>
            </div>

            <div class="form-group">
                <label for="customerType">Customer Type</label>
                <select class="form-control" id="customerType" th:field="*{customerType}">
                    <option value="">-- Select --</option>
                    <option value="Individual">Individual</option>
                    <option value="Corporate">Corporate</option>
                    <option value="SME">SME</option>
                </select>
                <div class="text-danger" th:if="${#fields.hasErrors('customerType')}" th:errors="*{customerType}"></div>
            </div>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" class="form-control" id="fullName" th:field="*{fullName}" minlength="2" maxlength="200">
                <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Date of Birth / Date of Incorporation</label>
                <input type="date" class="form-control" id="dateOfBirth" th:field="*{dateOfBirth}">
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select class="form-control" id="status" th:field="*{status}">
                    <option value="">-- Select --</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                    <option value="Suspended">Suspended</option>
                </select>
                <div class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
            </div>

            <div class="form-group">
                <label for="contactNumber">Contact Number</label>
                <input type="text" class="form-control" id="contactNumber" th:field="*{contactNumber}" maxlength="20">
            </div>

            <div class="form-group">
                <label for="mobileNumber">Mobile Number</label>
                <input type="text" class="form-control" id="mobileNumber" th:field="*{mobileNumber}" maxlength="20">
            </div>

            <div class="form-group">
                <label for="emailId">Email ID</label>
                <input type="email" class="form-control" id="emailId" th:field="*{emailId}">
                <div class="text-danger" th:if="${#fields.hasErrors('emailId')}" th:errors="*{emailId}"></div>
            </div>

            <div class="form-group">
                <label for="countryOfOrigination">Country of Origination</label>
                <input type="text" class="form-control" id="countryOfOrigination" th:field="*{countryOfOrigination}">
            </div>

            <button type="submit" class="btn btn-primary" th:text="${customerDetail.id != null} ? 'Update' : 'Save'">Save</button>
            <a th:href="@{/customers/details}" class="btn btn-secondary">Cancel</a>
        </form>
    </section>
</body>
</html>
