# ===================================================================
# Lab 7 and 8 - Thymeleaf UI Application Properties
# ===================================================================

# Server Configuration
server.port=8080

# ===================================================================
# MySQL Database Configuration
# UPDATE THESE VALUES with your MySQL Workbench connection details
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/springboot_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
